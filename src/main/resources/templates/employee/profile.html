<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile — Shift Transport System</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<nav class="navbar">
    <span class="navbar-title">Shift Transport System</span>
    <div style="display:flex; align-items:center; gap:1rem;">
        <a th:href="@{/employee/dashboard}" class="btn btn-small btn-secondary">← Dashboard</a>
        <span class="navbar-user" th:text="'Hello, ' + ${session.userName}"></span>
        <a th:href="@{/auth/logout}" class="btn btn-small">Logout</a>
    </div>
</nav>

<main class="container">

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <h2 style="margin-bottom:1.5rem;">My Profile</h2>

    <!-- Read-only info block -->
    <div class="form-card" style="margin-bottom:1.5rem;">
        <h3 style="margin-bottom:1rem; font-size:1rem; color:#555; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Account Details</h3>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div>
                <label style="font-size:0.82rem; color:#888; display:block; margin-bottom:0.2rem;">Full Name</label>
                <p style="margin:0; font-weight:500;" th:text="${user.fullName}"></p>
            </div>
            <div>
                <label style="font-size:0.82rem; color:#888; display:block; margin-bottom:0.2rem;">Phone Number</label>
                <p style="margin:0; font-weight:500;" th:text="${user.phoneNumber}"></p>
            </div>
        </div>

        <p style="margin-top:0.75rem; font-size:0.8rem; color:#aaa;">
            Name and phone number can only be changed by an administrator.
        </p>
    </div>

    <!-- Editable fields form -->
    <div class="form-card">
        <h3 style="margin-bottom:1rem; font-size:1rem; color:#555; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Update Information</h3>

        <form th:action="@{/employee/profile}" method="post" th:object="${form}">

            <!-- Address -->
            <div class="form-group">
                <label for="addressText" class="form-label">Home Address</label>
                <input type="text"
                       id="addressText"
                       class="form-control"
                       th:field="*{addressText}"
                       placeholder="e.g. Herzl 10, Tel Aviv"
                       maxlength="200">
                <div th:if="${#fields.hasErrors('addressText')}" class="field-error"
                     th:errors="*{addressText}"></div>
                <p style="font-size:0.8rem; color:#888; margin-top:0.3rem;">
                    Used by the driver for pickup and drop-off. Keep this up to date.
                </p>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email" class="form-label">Email Address <span style="color:#aaa; font-weight:400;">(optional)</span></label>
                <input type="email"
                       id="email"
                       class="form-control"
                       th:field="*{email}"
                       placeholder="e.g. yourname@example.com"
                       maxlength="150">
                <div th:if="${#fields.hasErrors('email')}" class="field-error"
                     th:errors="*{email}"></div>
            </div>

            <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/employee/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>

        </form>
    </div>

</main>

</body>
</html>
