<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Dashboard — Shift Transport System</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>

<nav class="navbar">
    <span class="navbar-title">Shift Transport System — Driver</span>
    <span class="navbar-user" th:text="'Hello, ' + ${session.userName}"></span>
    <a th:href="@{/auth/logout}" class="btn btn-small">Logout</a>
</nav>

<main class="container">

    <h2>My Assigned Trips</h2>

    <div th:if="${#lists.isEmpty(assignedEvents)}" class="empty-state">
        You have no assigned transport events at this time.
    </div>

    <table th:unless="${#lists.isEmpty(assignedEvents)}" class="table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Shift</th>
                <th>Hours</th>
                <th>Status</th>
                <th>Passengers</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="event : ${assignedEvents}">
                <td th:text="${#temporals.format(event.eventDate, 'dd/MM/yyyy')}"></td>
                <td th:text="${event.shiftName}"></td>
                <td th:text="${event.shiftHours}"></td>
                <td>
                    <span th:class="'badge ' +
                        (${event.status.name() == 'OPEN'}   ? 'badge-green' :
                        (${event.status.name() == 'LOCKED'} ? 'badge-blue'  : 'badge-gray'))"
                          th:text="${event.status}">
                    </span>
                </td>
                <td th:text="${#lists.size(event.passengers)}"></td>
                <td>
                    <a th:href="@{/driver/event/{id}(id=${event.id})}"
                       class="btn btn-small btn-primary">View List</a>
                </td>
            </tr>
        </tbody>
    </table>

</main>

</body>
</html>
