<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Sidebar navigation fragment.
  Include in any page with:
    <aside th:replace="~{fragments/nav :: sidebar}"></aside>

  Reads from session:
    - isManager           (boolean)
    - isSystemAdmin       (boolean)
    - isDriver            (boolean)
    - canRequestTransport (boolean)
-->
<aside th:fragment="sidebar">
    <nav class="sidebar">

        <!-- ── Operations (Manager / Admin) ── -->
        <div th:if="${session.isManager}">
            <p class="sidebar-section-title">Operations</p>
            <div class="sidebar-section">
                <a th:href="@{/manager/dashboard}" class="sidebar-link">📊 Events dashboard</a>
                <a th:href="@{/manager/event/new}" class="sidebar-link">➕ New event</a>
            </div>
            <hr class="sidebar-divider">
        </div>

        <!-- ── Driver ── -->
        <div th:if="${session.isDriver}">
            <p class="sidebar-section-title">Driver</p>
            <div class="sidebar-section">
                <a th:href="@{/driver/dashboard}" class="sidebar-link">🚗 My trips</a>
            </div>
            <hr class="sidebar-divider">
        </div>

        <!-- ── My Transport (anyone with canRequestTransport) ── -->
        <div th:if="${session.canRequestTransport}">
            <p class="sidebar-section-title">My transport</p>
            <div class="sidebar-section">
                <a th:href="@{/employee/dashboard}" class="sidebar-link">🚌 My requests</a>
            </div>
            <hr class="sidebar-divider">
        </div>

        <!-- ── Spacer pushes Account to bottom ── -->
        <div class="sidebar-spacer"></div>

        <!-- ── Account (always visible) ── -->
        <p class="sidebar-section-title">Account</p>
        <div class="sidebar-section">
            <a th:href="@{/employee/profile}" class="sidebar-link">👤 My profile</a>
            <a th:href="@{/auth/logout}" class="sidebar-link signout">🚪 Sign out</a>
        </div>

    </nav>
</aside>

</body>
</html>
