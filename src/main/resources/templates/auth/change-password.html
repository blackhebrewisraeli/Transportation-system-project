<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} + ' — Shift Transport System'">Change Password</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="login-page">

<div class="login-container" style="max-width:440px;">

    <h1>Shift Transport System</h1>
    <h2 th:text="${pageTitle}">Change Password</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>
    <div th:if="${infoMessage}"    class="alert alert-info"    th:text="${infoMessage}"></div>

    <!-- Password rules box -->
    <div class="password-rules-box">
        <strong>Password requirements:</strong>
        <ul>
            <li>At least <strong>8 characters</strong></li>
            <li>At least one <strong>uppercase</strong> letter (A–Z)</li>
            <li>At least one <strong>lowercase</strong> letter (a–z)</li>
            <li>At least one <strong>digit</strong> (0–9)</li>
            <li>At least one <strong>special character</strong> (e.g. <code>@$!%*?&amp;#</code>)</li>
        </ul>
    </div>

    <form method="post"
          th:action="${isFirstTime} ? @{/auth/set-password} : @{/auth/change-password}"
          th:object="${form}">

        <div class="form-group">
            <label for="newPassword">New password</label>
            <input type="password"
                   id="newPassword"
                   name="newPassword"
                   th:field="*{newPassword}"
                   autocomplete="new-password"
                   required
                   autofocus>
            <div th:if="${#fields.hasErrors('newPassword')}"
                 class="field-error"
                 th:errors="*{newPassword}"></div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <input type="password"
                   id="confirmPassword"
                   name="confirmPassword"
                   th:field="*{confirmPassword}"
                   autocomplete="new-password"
                   required>
            <div th:if="${#fields.hasErrors('confirmPassword')}"
                 class="field-error"
                 th:errors="*{confirmPassword}"></div>
            <!-- Cross-field mismatch error injected by controller -->
            <div th:if="${confirmError}" class="field-error" th:text="${confirmError}"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full"
                th:text="${isFirstTime} ? 'Set Password' : 'Update Password'">
            Update Password
        </button>

        <!-- Back link — only shown when the user is already logged in (change flow) -->
        <div th:unless="${isFirstTime}" style="margin-top:0.75rem; text-align:center;">
            <a th:href="@{/employee/profile}" style="font-size:0.85rem; color:#666;">← Back to profile</a>
        </div>

    </form>
</div>

<!-- Inline password strength indicator -->
<script>
(function () {
    const input = document.getElementById('newPassword');
    if (!input) return;

    const rules = [
        { re: /.{8,}/,        label: '8+ chars' },
        { re: /[A-Z]/,        label: 'Uppercase' },
        { re: /[a-z]/,        label: 'Lowercase' },
        { re: /\d/,           label: 'Digit' },
        { re: /[@$!%*?&#^()_+\-=\[\]{};':"\\|,.<>\/]/, label: 'Special char' }
    ];

    // Build indicator bar
    const bar = document.createElement('div');
    bar.style.cssText = 'display:flex; gap:4px; margin-top:6px;';

    const dots = rules.map(function (r) {
        const d = document.createElement('div');
        d.title = r.label;
        d.style.cssText =
            'flex:1; height:4px; border-radius:2px; background:#e0e0e0; transition:background 0.2s;';
        bar.appendChild(d);
        return { dot: d, re: r.re };
    });

    input.parentNode.insertBefore(bar, input.nextSibling);

    input.addEventListener('input', function () {
        const v = input.value;
        dots.forEach(function (item) {
            item.dot.style.background = item.re.test(v) ? '#27ae60' : '#e0e0e0';
        });
    });
})();
</script>

</body>
</html>
