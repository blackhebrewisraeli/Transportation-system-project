spring:
  application:
    name: shift-transport-system

  datasource:
    url: jdbc:postgresql://localhost:5432/shift_transport
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  thymeleaf:
    cache: false

server:
  port: 8080
