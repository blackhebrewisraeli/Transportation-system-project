spring:
  application:
    name: shift-transport-system

  # Database — uses environment variables in production (Railway sets these automatically).
  # Falls back to local development values when running on localhost.
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:shift_transport}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  thymeleaf:
    # false locally (live reload), true in production via THYMELEAF_CACHE env var
    cache: ${THYMELEAF_CACHE:false}

# PORT env var is set automatically by Railway. Falls back to 8080 locally.
server:
  port: ${PORT:8080}
