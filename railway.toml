# Railway deployment configuration for Shift Transport System
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
# Railway auto-detects Spring Boot and runs the built JAR.
# healthcheckPath ensures Railway waits for the app to be ready before routing traffic.
healthcheckPath = "/auth/login"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
